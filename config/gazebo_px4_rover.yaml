# FAST-LIVO2 config for PX4 Gazebo rover simulation
# Uses Velodyne VLP-16 (lidar_type=2) compatible with Gazebo ray sensor

common:
  img_topic: "/rover/camera/image_raw"
  lid_topic: "/rover/velodyne_points"
  imu_topic: "/rover/imu"
  img_en: 1
  lidar_en: 1
  ros_driver_bug_fix: false

extrin_calib:
  # LiDAR is at (0, 0, 0.32), IMU is at base_link (0, 0, 0)
  # T_imu_lidar: translation from IMU to LiDAR
  extrinsic_T: [0.0, 0.0, 0.32]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  # Camera is at (0.15, 0, 0.2), LiDAR is at (0, 0, 0.32)
  # T_lidar_camera = camera_pos - lidar_pos = (0.15, 0, -0.12)
  # R_lidar_camera: camera optical frame to LiDAR frame
  # Gazebo camera: +Z forward, +X right, +Y down (optical)
  # LiDAR frame: +X forward, +Y left, +Z up
  Rcl: [0, -1,  0,
        0,  0, -1,
        1,  0,  0]
  Pcl: [0.15, 0.0, -0.12]

time_offset:
  imu_time_offset: 0.0
  img_time_offset: 0.0
  exposure_time_init: 0.0

preprocess:
  point_filter_num: 1
  filter_size_surf: 0.15
  lidar_type: 2  # Velodyne VLP-16 (standard PointCloud2)
  scan_line: 16
  blind: 0.5

vio:
  max_iterations: 5
  outlier_threshold: 1000
  img_point_cov: 100
  patch_size: 8
  patch_pyrimid_level: 3
  normal_en: true
  raycast_en: false
  inverse_composition_en: false
  exposure_estimate_en: false  # disabled: Gazebo has constant exposure
  inv_expo_cov: 0.1

imu:
  imu_en: true
  imu_int_frame: 30
  acc_cov: 0.5
  gyr_cov: 0.3
  b_acc_cov: 0.0001
  b_gyr_cov: 0.0001

lio:
  max_iterations: 5
  dept_err: 0.02
  beam_err: 0.05
  min_eigen_value: 0.0025
  voxel_size: 0.5
  max_layer: 2
  max_points_num: 50
  layer_init_num: [5, 5, 5, 5, 5]

local_map:
  map_sliding_en: true
  half_map_size: 100
  sliding_thresh: 8

uav:
  imu_rate_odom: true
  gravity_align_en: true

publish:
  dense_map_en: true
  pub_effect_point_en: false
  pub_plane_en: false
  pub_scan_num: 1
  blind_rgb_points: 0.0

evo:
  seq_name: "gazebo_px4_rover"
  pose_output_en: false

pcd_save:
  pcd_save_en: false
  type: 0
  colmap_output_en: false
  filter_size_pcd: 0.15
  interval: -1

image_save:
  img_save_en: false
  interval: 1
